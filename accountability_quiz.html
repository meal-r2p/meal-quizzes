<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Підзвітність — MEAL Тренажер</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a3a6b;
    --pink: #E12269;
    --bg: #f0f4ff;
    --white: #fff;
    --gray: #6b7280;
    --gray-light: #e5e7eb;
    --radius: 12px;
    --shadow: 0 2px 16px rgba(26,58,107,0.10);
    --green: #059669; --green-bg: #d1fae5; --green-border: #6ee7b7;
    --red: #dc2626; --red-bg: #fee2e2; --red-border: #fca5a5;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; }

  .header { background: var(--navy); color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .header-logo { font-size: 11px; font-weight: 700; letter-spacing: .06em; opacity: .8; }
  .header-title { font-size: 14px; font-weight: 600; }

  .container { max-width: 700px; margin: 0 auto; padding: 1.5rem; }

  .progress-bar { height: 4px; background: var(--gray-light); border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--navy); transition: width .4s; }

  .topic-pill { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 20px; margin-bottom: .75rem; background: #EEF2FF; color: var(--navy); }

  .q-card { background: var(--white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1rem; }
  .q-text { font-size: 15px; line-height: 1.7; color: #1a1a2e; margin-bottom: .75rem; }
  .q-prompt { font-size: 13px; color: var(--gray); font-weight: 600; }

  .opts { display: grid; gap: 8px; margin-bottom: 1rem; }
  .opt { background: var(--white); border: 1.5px solid var(--gray-light); border-radius: 8px; padding: .75rem 1rem; font-size: 14px; font-weight: 500; color: #1a1a2e; cursor: pointer; text-align: left; font-family: inherit; transition: background .15s, border-color .15s; display: flex; gap: 10px; align-items: flex-start; line-height: 1.45; }
  .opt:hover:not(:disabled) { background: #f0f4ff; border-color: var(--navy); }
  .opt-letter { font-weight: 700; color: var(--gray); min-width: 18px; flex-shrink: 0; }
  .opt.correct { background: var(--green-bg); border-color: var(--green); color: #065f46; }
  .opt.correct .opt-letter { color: #065f46; }
  .opt.wrong { background: var(--red-bg); border-color: var(--red); color: #991b1b; }
  .opt.wrong .opt-letter { color: #991b1b; }
  .opt:disabled { cursor: default; }

  .fb { border-radius: 8px; padding: .85rem 1rem; font-size: 14px; line-height: 1.55; margin-bottom: 1rem; display: none; }
  .fb.correct { background: var(--green-bg); color: #065f46; border: 1px solid var(--green-border); }
  .fb.wrong { background: var(--red-bg); color: #991b1b; border: 1px solid var(--red-border); }

  .next-wrap { text-align: right; }
  .next-btn { background: var(--navy); border: none; border-radius: 8px; padding: .7rem 1.5rem; font-size: 14px; font-weight: 600; cursor: pointer; color: #fff; display: none; font-family: inherit; }
  .next-btn:hover { opacity: .9; }

  .result { text-align: center; padding: 3rem 1rem; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); }
  .result-score { font-size: 56px; font-weight: 700; color: var(--navy); margin-bottom: .5rem; }
  .result-label { font-size: 15px; color: var(--gray); margin-bottom: 1.5rem; line-height: 1.6; }
  .restart-btn { background: var(--navy); border: none; border-radius: 8px; padding: .7rem 1.5rem; font-size: 14px; font-weight: 600; cursor: pointer; color: #fff; font-family: inherit; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">ПРАВО НА ЗАХИСТ · MEAL</div>
  <div class="header-title">Підзвітність та ЗЗС</div>
</div>

<div class="container">
  <div id="quiz-area">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.5rem;">
      <div style="font-size:12px; color:var(--gray); font-weight:600;" id="qnum">Питання 1 з 4</div>
      <div style="font-size:12px; color:var(--gray);" id="qlive">✓ 0</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>

    <div class="q-card">
      <div class="topic-pill" id="tpill"></div>
      <div class="q-text" id="qtext"></div>
      <div class="q-prompt" id="qprompt"></div>
    </div>

    <div class="opts" id="opts"></div>
    <div class="fb" id="fb"></div>
    <div class="next-wrap">
      <button class="next-btn" id="nbtn">Наступне →</button>
    </div>
  </div>

  <div class="result" id="result" style="display:none">
    <div style="font-size:48px; margin-bottom:.5rem;">🎯</div>
    <div class="result-score" id="rscore"></div>
    <div class="result-label" id="rlabel"></div>
    <button class="restart-btn" onclick="restart()">Пройти ще раз</button>
  </div>
</div>

<script>
const letters = ['А','Б','В','Г'];

const qs = [
  {
    topic: 'Зворотний зв\'язок з бенефіціарами',
    text: 'Організація привезла у громаду побутові набори. Зібрався величезний натовп і ніхто не розумів, хто має право отримати допомогу.',
    prompt: 'Що найімовірніше не зробила організація?',
    opts: [
      'Не розповсюдила канали ЗЗС',
      'Не провела оцінку потреб (думки громади)',
      'Не проінформувала своєчасно про допомогу — хто, коли, де і хто може отримати',
      'Не відреагувала на скарги бенефіціарів'
    ],
    answer: 2,
    exp: 'Хаос під час розподілу — класичний наслідок відсутності <strong>своєчасного інформування</strong>: громада не знала ані критеріїв відбору, ані місця, ані порядку. Це порушення підзвітності — люди мають право знати що, коли і для кого.'
  },
  {
    topic: 'Канали зворотного зв\'язку',
    text: 'Організація збирається працювати у прифронтовій громаді, де немає інтернет-покриття.',
    prompt: 'Який канал ЗЗС буде НЕдоречним у цьому контексті?',
    opts: [
      'Скринька відгуків',
      'QR-код з посиланням на гугл-форму',
      'Телефон',
      'Усне спілкування'
    ],
    answer: 1,
    exp: '<strong>QR-код з посиланням на гугл-форму</strong> вимагає інтернету — він буде абсолютно недоречним там, де немає зв\'язку. Скринька відгуків, телефон та усне спілкування — це офлайн-канали, які можуть працювати без інтернету.'
  },
  {
    topic: 'Функціонування ЗЗС',
    text: 'Організація раніше роздавала продуктові набори в громаді. Частина бенефіціарів зазначила, що крупи потребують тривалої термічної обробки і в них немає можливості це робити. У подальшому організація замінила крупи в наборах.',
    prompt: 'Про що це свідчить?',
    opts: [
      'Врахування думок і потреб бенефіціарів',
      'Належне функціонування механізму ЗЗС',
      'Покращення проєктів на основі ЗЗС',
      'Усе вищеперелічене'
    ],
    answer: 3,
    exp: '<strong>Усе вищеперелічене.</strong> Цей приклад ілюструє повний цикл ЗЗС: бенефіціари висловили потреби → організація почула та зафіксувала зворотний зв\'язок → адаптувала програму. Це і врахування думок, і функціонуючий механізм ЗЗС, і реальне покращення проєкту.'
  },
  {
    topic: 'Підзвітність',
    text: 'На тренінгу виникло питання: "Хто відповідає за забезпечення підзвітності перед бенефіціарами в організації?"',
    prompt: 'Яка відповідь є правильною?',
    opts: [
      'Уся команда організації',
      'MEAL-відділ',
      'Керівник проєкту',
      'Керівник організації'
    ],
    answer: 0,
    exp: '<strong>Підзвітність — відповідальність усієї команди</strong>, а не лише MEAL-відділу чи керівника. Кожен співробітник, який взаємодіє з бенефіціарами, несе відповідальність за те, щоб люди отримували якісну допомогу з повагою до їхніх прав і гідності.'
  }
];

let cur = 0, score = 0, answered = false;

function render() {
  const q = qs[cur];
  document.getElementById('qnum').textContent = `Питання ${cur+1} з ${qs.length}`;
  document.getElementById('qlive').textContent = `✓ ${score}`;
  document.getElementById('prog').style.width = `${(cur/qs.length)*100}%`;
  document.getElementById('tpill').textContent = q.topic;
  document.getElementById('qtext').textContent = q.text;
  document.getElementById('qprompt').textContent = q.prompt;
  document.getElementById('fb').style.display = 'none';
  document.getElementById('nbtn').style.display = 'none';
  answered = false;

  const o = document.getElementById('opts');
  o.innerHTML = '';
  q.opts.forEach((opt,i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    b.onclick = () => select(i, q);
    o.appendChild(b);
  });
}

function select(idx, q) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.opt').forEach((b,i) => {
    b.disabled = true;
    if (i===q.answer) b.classList.add('correct');
    else if (i===idx && idx!==q.answer) b.classList.add('wrong');
  });
  const ok = idx===q.answer;
  if (ok) score++;
  document.getElementById('qlive').textContent = `✓ ${score}`;
  const fb = document.getElementById('fb');
  fb.className = 'fb '+(ok?'correct':'wrong');
  fb.innerHTML = (ok?'✓ Правильно! ':`✗ Правильна відповідь: <strong>${letters[q.answer]}) ${q.opts[q.answer]}</strong>. `)+q.exp;
  fb.style.display = 'block';
  const nb = document.getElementById('nbtn');
  nb.style.display = 'inline-block';
  nb.textContent = cur < qs.length-1 ? 'Наступне питання →' : 'Переглянути результат →';
}

document.getElementById('nbtn').onclick = () => {
  cur++;
  if (cur >= qs.length) showResult();
  else render();
};

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('prog').style.width = '100%';
  document.getElementById('rscore').textContent = `${score} / ${qs.length}`;
  const labels = ['Спробуйте ще раз — перечитайте матеріал','Є прогалини — перегляньте пояснення','Непогано!','Добре! Підзвітність засвоєно','Відмінно! Всі питання правильно ✓'];
  document.getElementById('rlabel').textContent = labels[score] || labels[4];
}

function restart() {
  cur = 0; score = 0; answered = false;
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  render();
}

render();
</script>
</body>
</html>
